name: Despliegue EKS - Estrategias de Rollout
#CAMBIO
on:
  push:
    branches:
      - master
  # Esto permite que el pipeline corra manualmente desde la pestaña Actions
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Estrategia (rolling-update, recreate, blue-green, canary)'
        required: true
        default: 'rolling-update'
      eks_cluster_name:
        description: 'Nombre del Cluster EKS'
        required: true
        default: 'duoc-eks-cluster-cli'
      aws_region:
        description: 'Región de AWS'
        required: true
        default: 'us-east-1'

jobs:
  deploy-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          # Usamos un valor por defecto si el input falla
          aws-region: ${{ github.event.inputs.aws_region || 'us-east-1' }}

      - name: Conectar a EKS
        run: |
          CLUSTER_NAME="${{ github.event.inputs.eks_cluster_name }}"
          REGION="${{ github.event.inputs.aws_region }}"
          
          # Si los inputs están vacíos, usamos valores por defecto
          if [ -z "$CLUSTER_NAME" ]; then CLUSTER_NAME="duoc-eks-cluster-cli"; fi
          if [ -z "$REGION" ]; then REGION="us-east-1"; fi
          
          echo "Conectando al clúster: $CLUSTER_NAME en la región: $REGION"
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$REGION"
      
      - name: 🔄 Rolling Update
        if: ${{ github.event.inputs.strategy == 'rolling-update' }}
        run: kubectl apply -f EA2/ACT2.1/ROLLING-UPDATE/rolling-update.yaml && kubectl rollout status deployment/duoc-app-rolling --timeout=300s

      - name: ❌ Recreate
        if: ${{ github.event.inputs.strategy == 'recreate' }}
        run: kubectl apply -f EA2/ACT2.1/ALL-IN-ONCE/all-in-once.yaml && kubectl rollout status deployment/duoc-app-recreate --timeout=300s
          
      - name: 🟦 Blue/Green
        if: ${{ github.event.inputs.strategy == 'blue-green' }}
        run: |
          kubectl apply -f EA2/ACT2.1/BLUE-GREEN/blue-green.yaml
          kubectl rollout status deployment/duoc-app-green --timeout=300s
          sleep 60
          kubectl patch service duoc-app-bg-service -p '{"spec": {"selector": {"version": "green"}}}'
          
      - name: 🐥 Canary
        if: ${{ github.event.inputs.strategy == 'canary' }}
        run: |
          kubectl apply -f EA2/ACT2.1/CANARY/canary.yaml
          kubectl rollout status deployment/duoc-app-canary-v2 --timeout=300s
          sleep 60
          kubectl scale deployment/duoc-app-canary-v2 --replicas=3
          kubectl scale deployment/duoc-app-stable-v1 --replicas=0
#lol

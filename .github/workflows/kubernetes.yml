name: Despliegue EKS - Estrategias de Rollout

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Estrategia a Ejecutar (rolling-update, recreate, blue-green, o canary)'
        required: true
        type: string
        default: 'rolling-update'
      eks_cluster_name:
        description: 'Nombre del Cluster EKS'
        required: true
        default: 'duoc-eks-cluster-cli'
      aws_region:
        description: 'Región de AWS'
        required: true
        default: 'us-east-1'

jobs:
  deploy-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Configurar Kubectl para EKS
        run: |
          aws eks update-kubeconfig --name ${{ github.event.inputs.eks_cluster_name }} --region ${{ github.event.inputs.aws_region }}
      
      - name: 🔄 Ejecutar Rolling Update
        if: ${{ github.event.inputs.strategy == 'rolling-update' }}
        run: |
          kubectl apply -f EA2/ACT2.1/ROLLING-UPDATE/rolling-update.yaml
          kubectl rollout status deployment/duoc-app-rolling --timeout=300s

      - name: ❌ Ejecutar Recreate (All-in-once)
        if: ${{ github.event.inputs.strategy == 'recreate' }}
        run: |
          kubectl apply -f EA2/ACT2.1/ALL-IN-ONCE/all-in-once.yaml
          kubectl rollout status deployment/duoc-app-recreate --timeout=300s
          
      - name: 🟦 Ejecutar Blue/Green
        if: ${{ github.event.inputs.strategy == 'blue-green' }}
        run: |
          YAML_FILE_GREEN="EA2/ACT2.1/BLUE-GREEN/blue-green.yaml"
          kubectl apply -f $YAML_FILE_GREEN
          kubectl rollout status deployment/duoc-app-green --timeout=300s
          sleep 60
          kubectl patch service duoc-app-bg-service -p '{"spec": {"selector": {"version": "green"}}}'
          
      - name: 🐥 Ejecutar Canary
        if: ${{ github.event.inputs.strategy == 'canary' }}
        run: |
          YAML_FILE_CANARY="EA2/ACT2.1/CANARY/canary.yaml"
          kubectl apply -f $YAML_FILE_CANARY
          kubectl rollout status deployment/duoc-app-canary-v2 --timeout=300s
          sleep 60
          kubectl scale deployment/duoc-app-canary-v2 --replicas=3
          kubectl scale deployment/duoc-app-stable-v1 --replicas=0
          #prueba

name: ECR Build & Push

# Activador ajustado a la rama develop
on:
  push:
    branches:
      - develop
  release:
    types: [published]

jobs:
  build-and-push:
    name: Build, Tag and Push to ECR
    # Condicional para evitar que corra en Pull Requests innecesarios
    if: ${{ github.event_name != 'pull_request' }}  
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: ⬇️ Checkout del Código
        uses: actions/checkout@v4
        
      - name: ⚙️ Configurar QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }} 

      - name: 🚪 Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: 🐳 Build, tag, and push image to ECR with layer caching
        uses: docker/build-push-action@v5
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Definimos el tag basándonos en si es un release o un commit normal
          NEW_IMAGE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          CACHE_IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.NEW_IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE_URI }}
          cache-to: type=inline

      - name: 📝 Log de Imagen Publicada
        run: echo "La imagen ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.NEW_IMAGE_TAG }} ha sido publicada exitosamente."
